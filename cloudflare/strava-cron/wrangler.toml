# Cloudflare Worker: cron drain hàng đợi webhook Strava cho app Kèo.
# Thay GitHub Actions (bị GitHub throttle, thực tế ~mỗi giờ) bằng Cloudflare Cron
# Trigger — chạy ĐÚNG lịch, đáng tin, và free (Workers Free: 100k req/ngày).
#
# Deploy:  cd cloudflare/strava-cron && wrangler deploy
# Test tay: mở URL worker (…​.workers.dev) trên trình duyệt, hoặc `wrangler dev`.
name = "keo-strava-cron"
main = "src/index.js"
compatibility_date = "2026-07-19"

# Mỗi 5 phút (CF cron đúng lịch nên dày hơn ~10' cũ mà vẫn free). Sửa nếu muốn.
[triggers]
crons = ["*/5 * * * *"]

[vars]
CRON_TARGET = "https://app.xox.vn/api/cron/strava"
