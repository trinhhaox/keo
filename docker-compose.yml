# Cả stack lên bằng một lệnh: docker compose up --build
# UI + API: http://localhost:8080 (DEV_MODE bật sẵn cho local)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: keo
      POSTGRES_DB: keo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keo"]
      interval: 2s
      timeout: 3s
      retries: 15

  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/work/migrations:ro
      - ./scripts:/work/scripts:ro
    working_dir: /work
    environment:
      DATABASE_URL: postgres://postgres:keo@db:5432/keo
    entrypoint: ["bash", "scripts/migrate.sh"]

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:keo@db:5432/keo
      DEV_MODE: "1"            # tắt khi deploy thật
      # Prod: set thêm TOKEN_CIPHER_KEY (32 bytes base64), ZALOPAY_KEY2,
      # STRAVA_CLIENT_ID/SECRET, STRAVA_VERIFY_TOKEN
    ports:
      - "8080:8080"

volumes:
  pgdata:
